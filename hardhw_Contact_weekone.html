<!doctype html>
<html lang="en-us">

<head>
    <meta charset="UTF-8">
    <title>Contact | Carisa Saenz-Videtto</title>
    <link rel="stylesheet" type="text/css" href="assets/styles/contact_index.css">

    <style>
        @import url('https://fonts.googleapis.com/css?family=Cormorant+Garamond');
    </style>

</head>

<body>

    <header id="masthead">
        <div class="container">
            <a href="index.html" id="logo">Carisa Saenz-Videtto</a>
            <nav>
                <a href="index_aboutme.html">About</a>
                <a href="hardhw_portfolio_weekone.html">Portfolio</a>
                <a href="hardhw_Contact_weekone.html">Contact</a>
            </nav>
        </div>
    </header>

    <div id="main-container" class="container">
        <section class="main-section">
            <h1>Contact</h1>

            <form id="contact-form">
                <ul>
                    <li>
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required="required">
                    </li>
                    <li>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required="required">
                    </li>
                    <li>
                        <label for="message">Message</label>
                        <textarea id="message" name="message"></textarea>
                    </li>
                </ul>
                <input type="submit">
            </form>

        </section>

    </div>

    <footer>
        <div class="container">
            Copyright &copy;
        </div>
    </footer>
</body>

</html>
